name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_DAEMON: 'false'

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Nx affected needs history to compute the diff base.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Sets NX_BASE / NX_HEAD so `nx affected` only runs projects touched by
      # this PR. Combined with the Nx cache below, CI stays fast as the repo grows.
      - uses: nrwl/nx-set-shas@v4

      # Restore the Nx computation cache between runs (incremental builds).
      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      # One pipeline; each target is cached and only re-runs for affected projects.
      - run: pnpm exec nx affected -t lint typecheck test build --parallel=3

      # Harness guardrails — the same checks the local Stop hook enforces.
      # gaps blocks too: TDD gate (no untested use case / adapter).
      - name: Harness structure, cycles & gaps
        run: |
          pnpm harness structure
          pnpm harness cycles
          pnpm harness gaps
      # Core test-coverage floor (domain + application).
      - name: Harness coverage
        run: pnpm harness coverage
      # Self-check: harness wiring is healthy AND portable to non-Claude agents
      # (AGENTS.md present, every skill maps to a CLI command, capabilities↔eslint).
      - name: Harness doctor (health + Claude/Codex portability)
        run: pnpm harness doctor
      # Advisory: surface dead code, dependency CVEs and skill risks without
      # failing the build (security baseline; promote to blocking once clean).
      - name: Harness dead-code, audit & skill-scan (advisory)
        continue-on-error: true
        run: |
          pnpm harness dead-code
          pnpm harness audit
          pnpm harness skill-scan

  # Full (non-affected) gate on main, so the cache and main branch stay healthy.
  full-on-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx run-many -t lint typecheck test build --parallel=3
      - name: Harness structure, cycles & gaps
        run: |
          pnpm harness structure
          pnpm harness cycles
          pnpm harness gaps
      - name: Harness coverage
        run: pnpm harness coverage
      - name: Harness doctor (health + Claude/Codex portability)
        run: pnpm harness doctor

  # Web-only e2e (cheap): real Chromium against `pnpm web`, no backend. Its own
  # job so it parallels the gate; CI=true makes Playwright always start a fresh
  # server (reuseExistingServer is false in CI).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Harness e2e (web-only)
        run: pnpm harness e2e

  # Backend e2e (heavy, Docker): real local Supabase + API + the three apps. A
  # separate job because it needs Docker + the Supabase CLI and takes minutes.
  e2e-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Boot the stack in its own step so the (slow, first-run) Docker image
      # pulls aren't bounded by global-setup's timeout. global-setup then re-runs
      # `supabase start` idempotently (a fast no-op) and seeds the owner user.
      - name: Start local Supabase (Docker)
        run: supabase start
      # The publishable key is deterministic from the committed config, but inject
      # the live value as belt-and-suspenders so a CLI key-format change can't
      # break auth. The apps read VITE_SUPABASE_ANON_KEY; global-setup reads
      # SUPABASE_ANON_KEY (both default to the committed key when unset).
      - name: Local Supabase key → env
        run: |
          PK=$(supabase status -o env | grep '^PUBLISHABLE_KEY=' | cut -d'"' -f2)
          {
            echo "VITE_SUPABASE_ANON_KEY=$PK"
            echo "SUPABASE_ANON_KEY=$PK"
          } >> "$GITHUB_ENV"
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Harness e2e-auth (real backend)
        run: pnpm harness e2e-auth
