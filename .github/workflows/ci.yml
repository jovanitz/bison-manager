name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_DAEMON: 'false'

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Nx affected needs history to compute the diff base.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Sets NX_BASE / NX_HEAD so `nx affected` only runs projects touched by
      # this PR. Combined with the Nx cache below, CI stays fast as the repo grows.
      - uses: nrwl/nx-set-shas@v4

      # Restore the Nx computation cache between runs (incremental builds).
      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      # One pipeline; each target is cached and only re-runs for affected projects.
      - run: pnpm exec nx affected -t lint typecheck test build --parallel=3

      # Harness guardrails — the same checks the local Stop hook enforces.
      - name: Harness structure & cycles
        run: |
          pnpm harness structure
          pnpm harness cycles
      # Core test-coverage floor (domain + application).
      - name: Harness coverage
        run: pnpm harness coverage
      # Advisory: surface development gaps & dead code without failing the build.
      - name: Harness gaps & dead-code (advisory)
        continue-on-error: true
        run: |
          pnpm harness gaps
          pnpm harness dead-code

  # Full (non-affected) gate on main, so the cache and main branch stay healthy.
  full-on-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx run-many -t lint typecheck test build --parallel=3
      - name: Harness structure & cycles
        run: |
          pnpm harness structure
          pnpm harness cycles
      - name: Harness coverage
        run: pnpm harness coverage
